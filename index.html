<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Benzinverbrauch Rechner</title>

<link
  rel="icon"
  type="image/svg+xml"
  href="./icons/fuel.svg"
/>
<link
  rel="apple-touch-icon"
  href="./icons/fuel.svg"
/>

<meta
  name="theme-color"
  content="#1f2937"
/>
  <!-- Styles -->
  <link rel="stylesheet" href="css/base.css?v=1.1">
  <link rel="stylesheet" href="css/layout.css?v=1.1">
  <link rel="stylesheet" href="css/components.css?v=1.1">
</head>

<body>

  <header>
    <h1>Benzinverbrauch</h1>
  </header>

  <!-- Tabs -->
  <nav class="tabs">
    <button data-tab="eingabe" class="active">Eingabe</button>
    <button data-tab="historie">Historie</button>
    <button data-tab="stats">Stats</button>
  </nav>

  <main>

    <!-- TAB: Eingabe -->
    <section id="eingabe" class="tab active">

      <label>Gefahrene km</label>
      <input 
        type="number" 
        id="km" 
        inputmode="numeric" 
        step="1"
        placeholder="z. B. 520">

      <label>Getankte Liter</label>
      <input 
        type="number" 
        id="liter" 
        inputmode="decimal" 
        step="0.01"
        placeholder="z. B. 34.2">

      <label>Preis pro Liter (€)</label>
      <input 
        type="number" 
        id="preis" 
        inputmode="decimal" 
        step="0.01"
        placeholder="z. B. 1.79">

      <button id="saveEntry">Speichern</button>


      <div id="feedback" class="feedback"></div>
    </section>

    <!-- TAB: Historie -->
    <section id="historie" class="tab">
      <div id="historyList"></div>
      <button id="exportBtn">
        Backup exportieren
      </button>
      <button id="importBtn">Backup importieren</button>
      <input type="file" id="importFile" accept="application/json" hidden />
    </section>

    <!-- TAB: Stats -->
    <section id="stats" class="tab">
      <p>Ø Verbrauch: <span id="avgVerbrauch">–</span> L/100km</p>
      <p>Ø Kosten: <span id="avgKosten">–</span> €</p>
    </section>

  </main>

  <!-- Scripts -->
  <script type="module" src="js/app.js?v=1.1"></script>

</body>
</html>
